# vLLM Engine Server 配置示例
#
# 复制此文件为 config.yaml 并修改实际值

server:
  host: "0.0.0.0"
  port: 8000
  title: "vLLM Engine Server"
  version: "1.0.0"
  description: "vLLM Engine 服务器"

model:
  # 模型路径（必需）
  path: "/data2/kaiyun/qwen/model"
  # 数据类型: auto, float16, bfloat16, float32
  dtype: "bfloat16"
  # 量化类型: fp8, int8, int4, awq, gptq, bitsandbytes, compressed-tensors, quark 等
  # 如果模型本身是量化的（如 FP8 权重），建议使用 "auto" 或不设置
  quantization: fp8
  # KV Cache 数据类型: auto, fp8, fp8_e4m3, fp8_e5m2, bfloat16
  # FP8 量化可额外节省 30-50% KV Cache 显存
  kv_cache_dtype: fp8

engine:
  # GPU显存利用率 (0-1)（必需）
  gpu_memory_utilization: 0.95

  # 使用的GPU编号，空表示使用全部GPU
  # 可以指定单卡如 "2"，多卡如 "0,1,2,3"
  gpu_ids: "2,3,4,5,6"

  # 最大模型长度，必须能被 tensor_parallel_size 整除
  max_model_len: 40960
  # KV cache block 大小，必须能被 tensor_parallel_size 整除
  block_size: 10240
  # 最大并发序列数
  max_num_seqs: 64
  # 张量并行大小，根据gpu_ids数量自动设置（留空则自动）
  # 单独配置则使用指定值
  tensor_parallel_size: null
  pipeline_parallel_size: 1
  # 数据并行大小 (需要Ray后端)
  data_parallel_size: 1
  # 分布式执行后端: mp(multiprocessing) 或 ray
  distributed_executor_backend: "mp"
  # 启用分块预填充
  enable_chunked_prefill: true
  # 分块预填充的最大 batch token 数，必须能被 tensor_parallel_size 整除
  max_num_batched_tokens: 8190
  # 启用前缀缓存
  enable_prefix_caching: true
  # 调度策略: fcfs 或 lpm
  scheduling_policy: "fcfs"
  # 随机种子
  seed: 42
  # 禁用自定义all-reduce
  disable_custom_all_reduce: true

multimodal:
  # 限制每个提示的多模态数量
  # 格式: {"image": 数量, "video": 数量}
  limit_mm_per_prompt:
    image: 4
    video: 2

logging:
  # 日志级别: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  # 记录所有API请求
  log_requests: false
  # 日志目录
  log_dir: "logs"
  # 请求日志文件名
  request_log_file: "api_requests.log"
  # 服务器日志文件名
  server_log_file: "server.log"

# 实验性功能
disable_prefix_caching: false
