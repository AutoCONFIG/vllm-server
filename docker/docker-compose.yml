# =============================================================================
# vLLM Engine Server Docker Compose配置
# =============================================================================
#
# 使用方法:
#   cp .env.example .env
#   # 编辑.env设置MODEL_PATH
#   docker-compose up -d
# =============================================================================

version: '3.8'

services:
  vllm-engine-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.custom
      args:
        VLLM_IMAGE: ${VLLM_IMAGE:-vllm/vllm-openai:latest}

    # 或使用预构建镜像
    # image: vllm-engine-server:latest

    container_name: vllm-engine-server

    # GPU配置
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "${HOST_PORT:-8000}:8000"

    environment:
      - VLLM_MODEL_PATH=${MODEL_PATH:-/model}
      - VLLM_SERVER_HOST=0.0.0.0
      - VLLM_SERVER_PORT=8000
      - VLLM_ENGINE_GPU_MEMORY_UTILIZATION=${GPU_MEMORY_UTILIZATION:-0.95}
      - VLLM_ENGINE_MAX_MODEL_LEN=${MAX_MODEL_LEN:-8192}
      - VLLM_ENGINE_TENSOR_PARALLEL_SIZE=${TENSOR_PARALLEL_SIZE:-1}
      - VLLM_LOGGING_LEVEL=${LOG_LEVEL:-INFO}
      - HF_TOKEN=${HF_TOKEN:-}
      - OMP_NUM_THREADS=1

    volumes:
      - ${MODEL_PATH:-./model}:/model:ro
      - ../config.yaml:/app/config.yaml:ro
      - ../logs:/app/logs

    shm_size: ${SHM_SIZE:-8gb}
    ipc: host

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5m

    restart: unless-stopped
